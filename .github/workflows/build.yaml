name: Publish to Exchange & Deploy to CH2.0

on:
  push:
    branches: [ main, QA ]

        
jobs:         
  build:
    runs-on: ubuntu-latest
    outputs:
      revision: ${{ steps.set-version.outputs.revision }}
      
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Check for API spec updates in Exchange
        run: |
          TOKEN=$(curl -s -X POST "https://${{ secrets.ANYPOINT_HOST }}/accounts/api/v2/oauth2/token" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "grant_type=client_credentials&client_id=${{ secrets.CONNECTED_APP_CLIENT_ID }}&client_secret=${{ secrets.CONNECTED_APP_CLIENT_SECRET }}" \
          | jq -r '.access_token')

          LATEST=$(curl -s -H "Authorization: Bearer $TOKEN" \
          "https://${{ secrets.ANYPOINT_HOST }}/exchange/api/v2/assets/${{ secrets.ANYPOINT_ORG }}/${{ secrets.SPEC_ASSET_ID }}" \
          | jq -r '.version')

          PINNED=$(cat .spec-version 2>/dev/null || echo "unknown")

          if [ "$PINNED" != "$LATEST" ]; then
          echo "::warning::API spec update available in Exchange: pinned=$PINNED latest=$LATEST. Consider re-scaffolding."
          fi  

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 17  
      
      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          echo "${{ secrets.MAVEN_SETTINGS_BASE64 }}" | base64 --decode > ~/.m2/settings.xml
          
           
      - name: Generate exchange version dynamically
        id: set-version
        run: |
          VERSION=1.0.${{ github.run_number }}
          echo "revision=$VERSION" >> $GITHUB_OUTPUT       
      
      - name: Publish to Exchange
        run: |
          mvn deploy --settings ~/.m2/settings.xml -DskipMunitTests \
          -Dclient.id="${{ secrets.CONNECTED_APP_CLIENT_ID }}" \
          -Dclient.secret="${{ secrets.CONNECTED_APP_CLIENT_SECRET }}" \
          -Drevision=${{ steps.set-version.outputs.revision }}         
          

  ch2deploy_dev:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        
      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          echo "${{ secrets.MAVEN_SETTINGS_BASE64 }}" | base64 --decode > ~/.m2/settings.xml  

      - name: Deploy to CloudHub 2.0 - Dev
        run: |
          mvn deploy --settings ~/.m2/settings.xml -DskipMunitTests -DmuleDeploy \
          -Pdev \
          -Dclient.id="${{ secrets.CONNECTED_APP_CLIENT_ID }}" \
          -Dclient.secret="${{ secrets.CONNECTED_APP_CLIENT_SECRET }}" \
          -Drevision=${{ needs.build.outputs.revision }} \
          -DskipExistingAppCheck=true
  
  ch2deploy_qa:
    needs: [build, ch2deploy_dev]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        
      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          echo "${{ secrets.MAVEN_SETTINGS_BASE64 }}" | base64 --decode > ~/.m2/settings.xml         

      - name: Deploy to CloudHub 2.0 - Test
        run: |
          mvn deploy --settings ~/.m2/settings.xml -DskipMunitTests -DmuleDeploy \
          -Pqa \
          -Dclient.id="${{ secrets.CONNECTED_APP_CLIENT_ID }}" \
          -Dclient.secret="${{ secrets.CONNECTED_APP_CLIENT_SECRET }}" \
          -Drevision=${{ needs.build.outputs.revision }} \
          -DskipExistingAppCheck=true